# Fetch the hero-image library from Wikimedia Commons into the repo.
#
# The MERIDIAN build sandbox cannot reach Commons (or any image host except
# raw.githubusercontent), so editions self-host their photos: this workflow
# downloads every manifest entry and commits it as assets/heroes/<slug>.jpg.
# make_photo_edition.py then embeds the committed copies. A fetch that fails
# is skipped and logged — a missing image stays missing, never faked.
name: Fetch hero images

on:
  push:
    branches: [main]
    paths: ["assets/heroes/manifest.json"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download manifest entries
        run: |
          python3 - <<'PY'
          import json, os, subprocess, urllib.parse, urllib.request
          man = json.load(open("assets/heroes/manifest.json"))
          for e in man["images"]:
              dst = f"assets/heroes/{e['slug']}.jpg"
              if os.path.exists(dst) and os.path.getsize(dst) > 10000:
                  print("have", dst); continue
              if e.get("url"):                     # any internet source
                  url = e["url"]
              else:                                # Wikimedia Commons filename
                  url = ("https://commons.wikimedia.org/wiki/Special:FilePath/"
                         + urllib.parse.quote(e["file"]) + "?width=1600")
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "meridian-hero-fetch/1.0"})
                  data = urllib.request.urlopen(req, timeout=60).read()
                  if len(data) < 10000: raise ValueError("suspiciously small")
                  open(dst, "wb").write(data)
                  print("fetched", dst, len(data), "bytes")
              except Exception as ex:
                  print("SKIP", e["slug"], "-", ex)
          PY
      - name: Commit fetched images
        run: |
          git config user.name "meridian-heroes"
          git config user.email "actions@users.noreply.github.com"
          git add -A assets/heroes
          git diff --cached --quiet || { git commit -m "assets: fetch hero images from Commons manifest"; git push; }
