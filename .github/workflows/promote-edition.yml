# Promote MERIDIAN editions to main.
#
# The 6AM Routine runs in a fresh Claude session whose git proxy only lets it
# push to its own claude/* branch (unless "Allow unrestricted branch pushes"
# is enabled on the routine). This workflow is the safety net: when an
# edition commit lands on any claude/* branch, it is fast-forwarded (or
# merged) into main automatically — so the edition ships even if the direct
# push to main was blocked.
#
# Guard: only commits whose message starts with "MERIDIAN No." are promoted.
name: Promote edition to main

on:
  push:
    branches: ["claude/**"]

permissions:
  contents: write

jobs:
  promote:
    if: startsWith(github.event.head_commit.message, 'MERIDIAN No.')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward main to the edition commit
        run: |
          git config user.name "meridian-promote"
          git config user.email "actions@users.noreply.github.com"
          git checkout main
          if git merge --ff-only "$GITHUB_SHA"; then
            echo "fast-forwarded main to $GITHUB_SHA"
          else
            # main moved since the routine cloned — a merge is fine for an
            # edition commit; if it conflicts, fail loudly (red tile + red CI).
            git merge --no-edit "$GITHUB_SHA"
          fi
          git push origin main

      - name: Clean up the routine branch
        run: git push origin --delete "${GITHUB_REF_NAME}" || true
